name: Gateware

on: [push, pull_request]

jobs:
  build-gateware:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -r firmware/fpga/requirements.txt

      - name: Build gateware
        run: |
          cd firmware/fpga
          python -m build
